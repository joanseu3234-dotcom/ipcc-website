<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>產業新知管理 | IPCC 後台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
  <style>
    .ins-table { width:100%; border-collapse:collapse; }
    .ins-table th { text-align:left; padding:10px 14px; font-size:0.78rem; font-weight:700; color:var(--text-sub); text-transform:uppercase; letter-spacing:0.05em; border-bottom:2px solid var(--border); }
    .ins-table td { padding:12px 14px; border-bottom:1px solid var(--border); vertical-align:middle; }
    .ins-table tr:last-child td { border-bottom:none; }
    .ins-tag-sm { background:rgba(0,200,255,0.1); color:#7DD9F8; border:1px solid rgba(0,200,255,0.2); padding:2px 8px; border-radius:100px; font-size:0.72rem; font-weight:600; display:inline-block; margin:2px; }

    .modal-tabs { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:20px; }
    .modal-tab { padding:10px 20px; font-size:0.85rem; font-weight:600; color:var(--text-sub); cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all 0.2s; font-family:inherit; }
    .modal-tab.active { color:var(--navy); border-bottom-color:var(--navy); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    .dyn-row { display:grid; gap:10px; align-items:center; background:rgba(0,0,0,0.15); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:8px; }
    .dyn-row-qa { grid-template-columns:1fr 32px; }
    .dyn-add-btn { background:rgba(0,200,255,0.08); border:1px dashed rgba(0,200,255,0.3); color:var(--navy); border-radius:8px; padding:8px; width:100%; font-size:0.85rem; cursor:pointer; font-family:inherit; transition:background 0.2s; }
    .dyn-add-btn:hover { background:rgba(0,200,255,0.15); }
    .dyn-del-btn { background:rgba(224,69,69,0.12); border:1px solid rgba(224,69,69,0.2); color:var(--red); border-radius:6px; padding:4px 8px; cursor:pointer; font-size:0.85rem; font-family:inherit; }
    .dyn-del-btn:hover { background:rgba(224,69,69,0.22); }

    .slug-row { display:flex; align-items:center; gap:8px; }
    .slug-preview { font-size:0.78rem; color:var(--text-sub); padding:6px 10px; background:rgba(0,0,0,0.2); border-radius:6px; flex:1; word-break:break-all; }

    .content-hint { font-size:0.78rem; color:var(--text-sub); margin-top:4px; line-height:1.6; }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="../IPCCLOGO-transparent.png" alt="IPCC" onerror="this.style.display='none'">
      <div class="sidebar-logo-text">
        <div class="co-name">IPCC 東州集團</div>
        <div class="co-sub">後台管理系統</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">📊 儀表板</a>
      <a href="home-manage.html" class="nav-item" data-perm="home">🏠 首頁管理</a>
      <a href="news-manage.html" class="nav-item" data-perm="news">📰 最新消息</a>
      <a href="about-manage.html" class="nav-item" data-perm="about">🏢 關於我們</a>
      <a href="services-manage.html" class="nav-item" data-perm="services">🛠 專案服務</a>
      <a href="cases-manage.html" class="nav-item" data-perm="cases">🏆 成功案例</a>
      <a href="insights-manage.html" class="nav-item active" data-perm="news">💡 產業新知</a>
      <a href="contacts-manage.html" class="nav-item" data-perm="contacts">📋 聯絡表單</a>
      <a href="contact-config.html" class="nav-item" data-perm="settings">📱 聯絡資訊設定</a>
      <a href="settings.html" class="nav-item" data-perm="settings">⚙️ 系統設定</a>
      <a href="users-manage.html" class="nav-item" data-perm="users">👥 帳號管理</a>
    </nav>
    <div class="sidebar-footer">
      <a href="../insights.html" target="_blank" class="btn-view-site"><span>🔗</span>查看前台</a>
      <button onclick="logout()" class="btn-logout"><span>🚪</span>登出</button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <main class="main-content">
    <header class="topbar">
      <button class="topbar-hamburger" onclick="toggleSidebar()">☰</button>
      <div class="topbar-title">產業新知管理</div>
      <div class="topbar-user">管理員</div>
    </header>
    <div class="page-content">
      <div class="page-header-row" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div>
          <h1>產業新知管理</h1>
          <p style="color:var(--text-sub);font-size:0.9rem;">管理客服產業新知文章，支援分類、標籤、TOC 目錄與 FAQ</p>
        </div>
        <button class="btn-primary" onclick="openInsModal()">+ 新增文章</button>
      </div>
      <div class="section-card">
        <div class="section-card-header">
          <h2 class="section-card-title">文章清單</h2>
          <span id="insCount" style="font-size:0.82rem;color:var(--text-sub);"></span>
        </div>
        <div style="overflow-x:auto;">
          <table class="ins-table">
            <thead>
              <tr>
                <th>文章標題</th>
                <th>分類</th>
                <th>標籤</th>
                <th>發布日期</th>
                <th>狀態</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="insTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Article Modal -->
<div class="modal-overlay" id="insModal">
  <div class="modal modal-lg" style="max-width:820px;">
    <div class="modal-header">
      <h3 id="insModalTitle">新增文章</h3>
      <button class="modal-close" onclick="closeInsModal()">✕</button>
    </div>
    <div class="modal-body" style="max-height:74vh;overflow-y:auto;padding-right:4px;">
      <input type="hidden" id="insId">

      <div class="modal-tabs">
        <button class="modal-tab active" onclick="switchTab('basic')">基本資訊</button>
        <button class="modal-tab" onclick="switchTab('content')">文章內容 &amp; FAQ</button>
      </div>

      <!-- 基本資訊 -->
      <div class="tab-panel active" id="tab-basic">
        <div class="form-group">
          <label class="form-label">文章標題</label>
          <input type="text" class="form-control" id="insTitle" placeholder="文章主標題" oninput="insAutoSlug()">
        </div>

        <div class="form-group">
          <label class="form-label">Slug（URL 識別碼）</label>
          <div class="slug-row">
            <input type="text" class="form-control" id="insSlug" placeholder="如：ai-customer-service-2026" style="flex:1;" oninput="updateInsSlugPreview()">
            <button type="button" class="btn-outline btn-sm" onclick="insAutoSlug(true)">自動產生</button>
          </div>
          <div class="slug-preview" id="insSlugPreview" style="margin-top:6px;">/insights/（請輸入 slug）</div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group">
            <label class="form-label">分類</label>
            <input type="text" class="form-control" id="insCategory" placeholder="如：產業趨勢、客服管理、數據分析">
          </div>
          <div class="form-group">
            <label class="form-label">發布日期</label>
            <input type="date" class="form-control" id="insDate">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">標籤（用逗號分隔）</label>
          <input type="text" class="form-control" id="insTags" placeholder="AI客服, LLM, 趨勢分析">
        </div>

        <div class="form-group">
          <label class="form-label">文章摘要（顯示在列表頁與 Hero 區）</label>
          <textarea class="form-control form-textarea" id="insExcerpt" rows="3" placeholder="簡短描述文章重點，約 60-120 字..."></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">封面圖片 URL（選填）</label>
          <input type="text" class="form-control" id="insCoverImage" placeholder="https://...">
        </div>

        <div class="form-group">
          <label class="form-label">延伸閱讀 Slugs（用逗號分隔）</label>
          <input type="text" class="form-control" id="insRelated" placeholder="omnichannel-cx-best-practices, cx-data-analytics-kpi">
          <div style="font-size:0.78rem;color:var(--text-sub);margin-top:4px;">填入其他文章的 slug，顯示為延伸閱讀；若空白則自動顯示其他文章</div>
        </div>

        <div class="form-group" style="display:flex;align-items:center;gap:10px;">
          <input type="checkbox" id="insPublished" style="width:18px;height:18px;cursor:pointer;">
          <label for="insPublished" class="form-label" style="margin:0;cursor:pointer;">發布（顯示在前台）</label>
        </div>
      </div>

      <!-- 文章內容 & FAQ -->
      <div class="tab-panel" id="tab-content">
        <div class="form-group">
          <label class="form-label">文章內容</label>
          <textarea class="form-control form-textarea" id="insContent" rows="16" placeholder="輸入文章內容...

支援以下格式：
## 二級標題（自動加入目錄）
### 三級標題
空行分段（段落間空一行）
一般文字直接輸入"></textarea>
          <div class="content-hint">
            💡 使用 <code>## 標題</code> 建立 H2（自動加入文章目錄）／<code>### 標題</code> 建立 H3／空行分段
          </div>
        </div>

        <div class="form-group" style="margin-top:24px;">
          <label class="form-label" style="margin-bottom:10px;">FAQ 常見問題</label>
          <div id="insFaqList"></div>
          <button type="button" class="dyn-add-btn" onclick="addInsFaq()">+ 新增 Q&amp;A</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeInsModal()">取消</button>
      <button class="btn-primary" onclick="saveInsight()">儲存</button>
    </div>
  </div>
</div>

<script src="users-config.js"></script>
<script src="admin.js"></script>
<script>
  requireLogin();
  initAdminUI();

  function switchTab(name) {
    var names = ['basic', 'content'];
    document.querySelectorAll('.modal-tab').forEach(function(t, i) {
      t.classList.toggle('active', names[i] === name);
    });
    document.querySelectorAll('.tab-panel').forEach(function(p) {
      p.classList.toggle('active', p.id === 'tab-' + name);
    });
  }

  function renderTable() {
    var items = getInsights().slice().sort(function(a,b){ return a.order - b.order; });
    document.getElementById('insCount').textContent = items.length + ' 篇文章';
    document.getElementById('insTableBody').innerHTML = items.map(function(a) {
      var tags = (a.tags||[]).map(function(t){ return '<span class="ins-tag-sm">'+t+'</span>'; }).join('');
      var pub = a.published
        ? '<span style="font-size:0.75rem;padding:3px 10px;border-radius:100px;background:rgba(72,187,120,0.12);color:#68D391;">已發布</span>'
        : '<span style="font-size:0.75rem;padding:3px 10px;border-radius:100px;background:rgba(80,80,80,0.2);color:var(--text-sub);">草稿</span>';
      return '<tr data-id="'+a.id+'">'
        +'<td><strong>'+(a.title||'')+'</strong><div style="font-size:0.75rem;color:var(--text-sub);margin-top:2px;font-family:monospace;">'+(a.slug?'/insights/'+a.slug:'—')+'</div></td>'
        +'<td style="font-size:0.85rem;">'+(a.category||'—')+'</td>'
        +'<td>'+tags+'</td>'
        +'<td style="font-size:0.82rem;color:var(--text-sub);">'+(a.publish_date||'—')+'</td>'
        +'<td>'+pub+'</td>'
        +'<td style="white-space:nowrap;">'
        +'<button class="btn-outline btn-sm" onclick="editIns(\''+a.id+'\')">編輯</button>'
        +(a.slug?' <a href="../insights/'+a.slug+'" target="_blank" class="btn-outline btn-sm" style="font-size:0.72rem;">預覽</a>':'')
        +' <button class="btn-red btn-sm" onclick="deleteIns(\''+a.id+'\')">刪除</button>'
        +'</td>'
        +'</tr>';
    }).join('');
  }

  // ── Slug helpers ──
  function titleToSlug(str) {
    return (str||'').toLowerCase()
      .replace(/[一-鿿㐀-䶿]+/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '') || 'insight-' + Date.now();
  }
  function insAutoSlug(force) {
    var slug = document.getElementById('insSlug');
    if (force || !slug.value.trim()) {
      slug.value = titleToSlug(document.getElementById('insTitle').value);
    }
    updateInsSlugPreview();
  }
  function updateInsSlugPreview() {
    var v = document.getElementById('insSlug').value.trim();
    document.getElementById('insSlugPreview').textContent = v ? '/insights/' + v : '/insights/（請輸入 slug）';
  }

  // ── FAQ dynamic rows ──
  function addInsFaq(f) {
    f = f || {q:'', a:''};
    var row = document.createElement('div');
    row.className = 'dyn-row';
    row.style.gridTemplateColumns = '1fr 32px';
    row.innerHTML = '<div>'
      +'<input type="text" value="'+escHtml(f.q)+'" placeholder="問題" class="form-control" data-field="q" style="margin-bottom:8px;">'
      +'<textarea placeholder="回答..." class="form-control form-textarea" data-field="a" rows="2" style="margin:0;">'+escHtml(f.a)+'</textarea>'
      +'</div>'
      +'<button type="button" class="dyn-del-btn" style="align-self:start;margin-top:4px;" onclick="this.closest(\'.dyn-row\').remove()">✕</button>';
    document.getElementById('insFaqList').appendChild(row);
  }

  function collectFaq() {
    return Array.from(document.querySelectorAll('#insFaqList .dyn-row')).map(function(row) {
      return {
        q: (row.querySelector('[data-field="q"]') || {}).value || '',
        a: (row.querySelector('[data-field="a"]') || {}).value || ''
      };
    }).filter(function(o){ return o.q || o.a; });
  }

  function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Modal ──
  function openInsModal(a) {
    switchTab('basic');
    document.getElementById('insModalTitle').textContent = a ? '編輯文章' : '新增文章';
    document.getElementById('insId').value          = a ? a.id : '';
    document.getElementById('insTitle').value       = a ? (a.title||'') : '';
    document.getElementById('insSlug').value        = a ? (a.slug||'') : '';
    document.getElementById('insCategory').value    = a ? (a.category||'') : '';
    document.getElementById('insTags').value        = a ? (a.tags||[]).join(', ') : '';
    document.getElementById('insExcerpt').value     = a ? (a.excerpt||'') : '';
    document.getElementById('insCoverImage').value  = a ? (a.cover_image||'') : '';
    document.getElementById('insContent').value     = a ? (a.content||'') : '';
    document.getElementById('insDate').value        = a ? (a.publish_date||'') : new Date().toISOString().slice(0,10);
    document.getElementById('insRelated').value     = a ? (a.related_slugs||[]).join(', ') : '';
    document.getElementById('insPublished').checked = a ? !!a.published : true;
    document.getElementById('insFaqList').innerHTML = '';
    if (a) (a.faq||[]).forEach(addInsFaq);
    updateInsSlugPreview();
    document.getElementById('insModal').classList.add('open');
  }
  function closeInsModal() { document.getElementById('insModal').classList.remove('open'); }
  function editIns(id) { var a = getInsights().find(function(a){ return a.id===id; }); if(a) openInsModal(a); }
  function deleteIns(id) {
    if (!confirm('確定要刪除此文章？')) return;
    saveInsights(getInsights().filter(function(a){ return a.id!==id; }));
    renderTable();
  }

  function saveInsight() {
    var id = document.getElementById('insId').value || genId();
    var insights = getInsights();
    var idx = insights.findIndex(function(a){ return a.id===id; });
    var slug = (function() {
      var s = document.getElementById('insSlug').value.trim();
      if (!s) {
        var existing = insights.find(function(x){ return x.id===id; });
        if (existing && existing.slug) return existing.slug;
        s = titleToSlug(document.getElementById('insTitle').value);
      }
      return s;
    })();
    var item = {
      id: id,
      slug: slug,
      title: document.getElementById('insTitle').value.trim(),
      excerpt: document.getElementById('insExcerpt').value.trim(),
      category: document.getElementById('insCategory').value.trim(),
      tags: document.getElementById('insTags').value.split(',').map(function(t){ return t.trim(); }).filter(Boolean),
      cover_image: document.getElementById('insCoverImage').value.trim(),
      content: document.getElementById('insContent').value,
      faq: collectFaq(),
      related_slugs: document.getElementById('insRelated').value.split(',').map(function(s){ return s.trim(); }).filter(Boolean),
      published: document.getElementById('insPublished').checked,
      publish_date: document.getElementById('insDate').value,
      order: idx >= 0 ? insights[idx].order : insights.length
    };
    if (idx >= 0) insights[idx] = item; else insights.push(item);
    saveInsights(insights);
    closeInsModal();
    renderTable();
  }

  renderTable();
</script>
</body>
</html>
