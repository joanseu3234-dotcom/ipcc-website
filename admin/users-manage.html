<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帳號管理 | IPCC 後台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
  <style>
    .user-table { width:100%; border-collapse:collapse; }
    .user-table th { text-align:left; padding:10px 14px; font-size:0.78rem; font-weight:700; color:var(--text-sub); text-transform:uppercase; letter-spacing:0.05em; border-bottom:2px solid var(--border); }
    .user-table td { padding:12px 14px; border-bottom:1px solid var(--border); vertical-align:middle; }
    .user-table tr:last-child td { border-bottom:none; }
    .user-avatar { width:34px; height:34px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-weight:800; font-size:0.9rem; flex-shrink:0; }
    .perm-pills { display:flex; flex-wrap:wrap; gap:4px; }
    .perm-pill { padding:2px 8px; border-radius:100px; font-size:0.7rem; font-weight:700; }
    .perm-pill.on  { background:rgba(30,42,94,0.1); color:var(--navy); }
    .perm-pill.off { background:#F3F4F6; color:#9CA3AF; text-decoration:line-through; }
    .super-badge { background:linear-gradient(135deg,#C8161D,#7B0D12); color:#fff; padding:3px 10px; border-radius:100px; font-size:0.72rem; font-weight:700; }
    .perm-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    .perm-row { display:flex; align-items:center; gap:10px; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; transition:border-color 0.2s, background 0.2s; }
    .perm-row:hover { border-color:var(--navy); background:rgba(30,42,94,0.03); }
    .perm-row input[type=checkbox] { width:17px; height:17px; cursor:pointer; accent-color:var(--navy); }
    .perm-row label { cursor:pointer; font-size:0.88rem; font-weight:600; margin:0; flex:1; }
    .last-login { font-size:0.78rem; color:var(--text-sub); }
    .info-banner { background:#EFF6FF; border:1px solid #BFDBFE; border-radius:10px; padding:12px 16px; font-size:0.85rem; color:#1E40AF; margin-bottom:20px; display:flex; gap:10px; align-items:flex-start; }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <img src="../IPCCLOGO-transparent.png" alt="IPCC" onerror="this.style.display='none'">
        <div class="sidebar-logo-text">
        <div class="co-name">IPCC 東州集團</div>
          <div class="co-sub">後台管理系統</div>
        </div>
      </div>
          <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">📊 儀表板</a>
      <a href="home-manage.html" class="nav-item" data-perm="home">🏠 首頁管理</a>
      <a href="news-manage.html" class="nav-item" data-perm="news">📰 最新消息</a>
      <a href="about-manage.html" class="nav-item" data-perm="about">🏢 關於我們</a>
      <a href="services-manage.html" class="nav-item" data-perm="services">🛠 專案服務</a>
      <a href="cases-manage.html" class="nav-item" data-perm="cases">🏆 成功案例</a>
      <a href="contacts-manage.html" class="nav-item" data-perm="contacts">📋 聯絡表單</a>
      <a href="settings.html" class="nav-item" data-perm="settings">⚙️ 系統設定</a>
      <a href="users-manage.html" class="nav-item active" data-perm="users">👥 帳號管理</a>
    </nav>
      <div class="sidebar-footer">
        <a href="../index.html" target="_blank" class="view-site-btn">🔗 查看前台</a>
        <button onclick="logout()" class="logout-btn">登出</button>
      </div>
    </aside>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <main class="main-content">
      <header class="topbar">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <div class="topbar-title">帳號管理</div>
        <div class="topbar-user">管理員</div>
      </header>
      <div class="page-content">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
          <div>
            <h1 style="font-size:1.6rem; font-weight:800; color:var(--navy-dark); margin-bottom:4px;">帳號管理</h1>
            <p style="color:var(--text-sub); font-size:0.9rem;">新增使用者帳號並設定後台操作權限</p>
          </div>
          <div style="display:flex; gap:8px;">
            <button class="btn-outline" onclick="exportUsersConfig()" title="將帳號清單匯出為 users-config.js，覆蓋原檔後重新部署，即可讓所有電腦使用新帳號">📥 匯出用戶設定</button>
            <button class="btn-primary" onclick="openModal()">+ 新增帳號</button>
          </div>
        </div>

        <!-- 說明提示 -->
        <div style="background:#EFF6FF; border:1px solid #BFDBFE; border-radius:10px; padding:12px 16px; margin-bottom:20px; font-size:0.85rem; color:#1E40AF;">
          ℹ️ 新增或修改帳號後，點側欄的 <strong>🚀 發布上線</strong> 即可讓所有人登入。
        </div>

        <div class="section-card">
          <div style="overflow-x:auto;">
            <table class="user-table">
              <thead>
                <tr>
                  <th>帳號</th>
                  <th>顯示名稱</th>
                  <th>開放權限</th>
                  <th>最後登入</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="userTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 新增/編輯 Modal -->
  <div class="modal-overlay" id="userModal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3 id="modalTitle">新增帳號</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="userId">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
          <div class="form-group">
            <label class="form-label">帳號（登入用）</label>
            <input type="text" class="form-control" id="userUsername" placeholder="帳號名稱" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label">顯示名稱</label>
            <input type="text" class="form-control" id="userDisplay" placeholder="如：編輯員 A">
          </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
          <div class="form-group">
            <label class="form-label" id="passLabel">密碼</label>
            <input type="password" class="form-control" id="userPassword" placeholder="請輸入密碼（至少 6 字元）" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label class="form-label">確認密碼</label>
            <input type="password" class="form-control" id="userPasswordConfirm" placeholder="再次輸入密碼">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" style="margin-bottom:12px;">後台存取權限</label>
          <div class="perm-grid" id="permGrid">
            <label class="perm-row"><input type="checkbox" id="perm-home"><label for="perm-home">🏠 首頁管理</label></label>
            <label class="perm-row"><input type="checkbox" id="perm-about"><label for="perm-about">🏢 關於我們</label></label>
            <label class="perm-row"><input type="checkbox" id="perm-services"><label for="perm-services">🛠 專案服務</label></label>
            <label class="perm-row"><input type="checkbox" id="perm-news"><label for="perm-news">📰 最新消息</label></label>
            <label class="perm-row"><input type="checkbox" id="perm-cases"><label for="perm-cases">🏆 成功案例</label></label>
            <label class="perm-row"><input type="checkbox" id="perm-contacts"><label for="perm-contacts">📋 聯絡表單</label></label>
            <label class="perm-row"><input type="checkbox" id="perm-settings"><label for="perm-settings">⚙️ 系統設定</label></label>
            <label class="perm-row"><input type="checkbox" id="perm-users"><label for="perm-users">👥 帳號管理</label></label>
          </div>
          <div style="margin-top:10px;">
            <button type="button" class="btn-outline btn-sm" onclick="toggleAllPerms(true)" style="margin-right:6px;">全選</button>
            <button type="button" class="btn-outline btn-sm" onclick="toggleAllPerms(false)">全部取消</button>
          </div>
        </div>
        <div id="modalMsg"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-outline" onclick="closeModal()">取消</button>
        <button class="btn-primary" onclick="saveUser()">儲存帳號</button>
      </div>
    </div>
  </div>

  <!-- 修改密碼 Modal -->
  <div class="modal-overlay" id="changePwModal">
    <div class="modal">
      <div class="modal-header">
        <h3>修改密碼</h3>
        <button class="modal-close" onclick="document.getElementById('changePwModal').classList.remove('open')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="changePwUserId">
        <div id="changePwTargetName" style="font-weight:700; color:var(--navy-dark); margin-bottom:16px; font-size:1rem;"></div>
        <div class="form-group">
          <label class="form-label">新密碼</label>
          <input type="password" class="form-control" id="newPw" placeholder="至少 6 字元" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label">確認新密碼</label>
          <input type="password" class="form-control" id="newPwConfirm" placeholder="再次輸入新密碼">
        </div>
        <div id="changePwMsg"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-outline" onclick="document.getElementById('changePwModal').classList.remove('open')">取消</button>
        <button class="btn-primary" onclick="doChangePassword()">確認修改</button>
      </div>
    </div>
  </div>

  <script src="users-config.js"></script>
  <script src="admin.js"></script>
  <script>
    requireLogin();
    initAdminUI();

    const PERM_KEYS = ['home','about','services','news','cases','contacts','settings','users'];
    const PERM_LABELS = { home:'🏠首頁', about:'🏢關於', services:'🛠服務', news:'📰消息', cases:'🏆案例', contacts:'📋表單', settings:'⚙️設定', users:'👥帳號' };
    const AVATAR_COLORS = ['#1E2A5E','#C8161D','#2563EB','#059669','#7C3AED','#D97706','#0891B2'];

    function formatDate(ts) {
      if (!ts) return '從未登入';
      const d = new Date(ts);
      return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0')
        + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }

    function renderTable() {
      const users = getUsers();
      const me = getCurrentUser();
      const tbody = document.getElementById('userTableBody');
      tbody.innerHTML = users.map(function(u, i) {
        const initial = (u.displayName || u.username).charAt(0).toUpperCase();
        const bg = AVATAR_COLORS[i % AVATAR_COLORS.length];
        const permHtml = u.isSuper
          ? '<span class="super-badge">全部權限</span>'
          : PERM_KEYS.map(function(k) {
              const on = u.permissions && u.permissions[k];
              return '<span class="perm-pill ' + (on?'on':'off') + '">' + PERM_LABELS[k] + '</span>';
            }).join('');
        const isMe = me && me.id === u.id;
        const canDelete = !u.isSuper && !isMe;
        return '<tr>'
          + '<td><div style="display:flex;align-items:center;gap:10px;"><div class="user-avatar" style="background:'+bg+';color:#fff;">'+initial+'</div><div><div style="font-weight:700;font-size:0.92rem;">'+u.username+'</div>'+(isMe?'<div style="font-size:0.72rem;color:var(--red);">目前登入中</div>':'')+'</div></div></td>'
          + '<td style="font-weight:600;">'+u.displayName+'</td>'
          + '<td><div class="perm-pills">'+permHtml+'</div></td>'
          + '<td class="last-login">'+formatDate(u.lastLogin)+'</td>'
          + '<td style="white-space:nowrap;">'
          + (!u.isSuper ? '<button class="btn-outline btn-sm" onclick="openModal(\'' + u.id + '\')">編輯</button> ' : '')
          + '<button class="btn-outline btn-sm" onclick="openChangePw(\'' + u.id + '\')">改密碼</button> '
          + (canDelete ? '<button class="btn-red btn-sm" onclick="deleteUser(\'' + u.id + '\')">刪除</button>' : '')
          + '</td></tr>';
      }).join('');
    }

    function openModal(uid) {
      const u = uid ? getUsers().find(function(u){return u.id===uid;}) : null;
      document.getElementById('modalTitle').textContent = u ? '編輯帳號' : '新增帳號';
      document.getElementById('userId').value = u ? u.id : '';
      document.getElementById('userUsername').value = u ? u.username : '';
      document.getElementById('userDisplay').value = u ? u.displayName : '';
      document.getElementById('userPassword').value = '';
      document.getElementById('userPasswordConfirm').value = '';
      document.getElementById('passLabel').textContent = u ? '新密碼（留空不修改）' : '密碼';
      document.getElementById('modalMsg').innerHTML = '';
      PERM_KEYS.forEach(function(k) {
        const el = document.getElementById('perm-'+k);
        if (el) el.checked = u ? !!(u.permissions && u.permissions[k]) : false;
      });
      document.getElementById('userModal').classList.add('open');
    }
    function closeModal() { document.getElementById('userModal').classList.remove('open'); }

    function toggleAllPerms(val) {
      PERM_KEYS.forEach(function(k) {
        var el = document.getElementById('perm-'+k);
        if (el) el.checked = val;
      });
    }

    function saveUser() {
      const uid = document.getElementById('userId').value;
      const username = document.getElementById('userUsername').value.trim();
      const displayName = document.getElementById('userDisplay').value.trim();
      const pw = document.getElementById('userPassword').value;
      const pwc = document.getElementById('userPasswordConfirm').value;
      const msg = document.getElementById('modalMsg');

      if (!username || !displayName) {
        msg.innerHTML = '<div class="alert alert-error">帳號與顯示名稱不能空白</div>'; return;
      }
      if (!uid && pw.length < 6) {
        msg.innerHTML = '<div class="alert alert-error">密碼至少 6 個字元</div>'; return;
      }
      if (pw && pw !== pwc) {
        msg.innerHTML = '<div class="alert alert-error">兩次密碼不一致</div>'; return;
      }

      const users = getUsers();
      // 檢查帳號是否重複
      const dup = users.find(function(u){ return u.username === username && u.id !== uid; });
      if (dup) { msg.innerHTML = '<div class="alert alert-error">此帳號名稱已被使用</div>'; return; }

      const permissions = {};
      PERM_KEYS.forEach(function(k) {
        const el = document.getElementById('perm-'+k);
        permissions[k] = el ? el.checked : false;
      });

      const idx = uid ? users.findIndex(function(u){return u.id===uid;}) : -1;
      if (idx >= 0) {
        users[idx].username = username;
        users[idx].displayName = displayName;
        users[idx].permissions = permissions;
        if (pw) users[idx].password = pw;
      } else {
        users.push({
          id: genId(),
          username, displayName, password: pw,
          isSuper: false, permissions,
          createdAt: Date.now(), lastLogin: null
        });
      }
      closeModal();
      saveAndSync(users);
      renderTable();
    }

    function deleteUser(uid) {
      const me = getCurrentUser();
      if (me && me.id === uid) { alert('無法刪除目前登入中的帳號'); return; }
      const u = getUsers().find(function(u){return u.id===uid;});
      if (!u) return;
      if (!confirm('確定要刪除帳號「' + u.displayName + '（' + u.username + '）」？')) return;
      var updated = getUsers().filter(function(u){return u.id!==uid;});
      saveAndSync(updated);
      renderTable();
    }

    function openChangePw(uid) {
      const u = getUsers().find(function(u){return u.id===uid;});
      if (!u) return;
      document.getElementById('changePwUserId').value = uid;
      document.getElementById('changePwTargetName').textContent = '帳號：' + u.displayName + '（' + u.username + '）';
      document.getElementById('newPw').value = '';
      document.getElementById('newPwConfirm').value = '';
      document.getElementById('changePwMsg').innerHTML = '';
      document.getElementById('changePwModal').classList.add('open');
    }

    function doChangePassword() {
      const uid = document.getElementById('changePwUserId').value;
      const pw = document.getElementById('newPw').value;
      const pwc = document.getElementById('newPwConfirm').value;
      const msg = document.getElementById('changePwMsg');
      if (pw.length < 6) { msg.innerHTML = '<div class="alert alert-error">密碼至少 6 個字元</div>'; return; }
      if (pw !== pwc) { msg.innerHTML = '<div class="alert alert-error">兩次密碼不一致</div>'; return; }
      const users = getUsers();
      const idx = users.findIndex(function(u){return u.id===uid;});
      if (idx < 0) { msg.innerHTML = '<div class="alert alert-error">找不到使用者</div>'; return; }
      users[idx].password = pw;
      document.getElementById('changePwModal').classList.remove('open');
      saveAndSync(users);
      renderTable();
    }

    function exportUsersConfig() {
      var users = getUsers();
      var frontendUrl = (window.IPCC_FRONTEND_URL || 'https://ipcc.zeabur.app');
      var content = '// IPCC 後台用戶設定\n'
        + '// =====================================================\n'
        + '// 此檔案讓所有電腦共用同一份帳號清單\n'
        + '// 新增/修改帳號後，點「匯出用戶設定」下載此檔案\n'
        + '// 將下載的 users-config.js 覆蓋 admin/users-config.js，再重新部署\n'
        + '// =====================================================\n\n'
        + "window.IPCC_FRONTEND_URL = '" + frontendUrl + "';\n\n"
        + 'window.IPCC_USERS_CONFIG = ' + JSON.stringify(users, null, 2) + ';\n';
      var blob = new Blob([content], { type: 'text/javascript' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'users-config.js';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      alert('✅ users-config.js 已下載！\n\n請執行以下步驟：\n1. 將此檔案覆蓋 IPCCOWB/admin/users-config.js\n2. 執行 sync-from-ipccowb.bat 同步並部署\n3. 同事即可用新帳號登入');
    }

    function saveAndSync(users) {
      saveUsers(users);
    }

    renderTable();
  </script>
</body>
</html>
