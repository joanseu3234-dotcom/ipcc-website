<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>專案服務管理 | IPCC 後台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
  <style>
    .svc-list-table { width:100%; border-collapse:collapse; }
    .svc-list-table th { text-align:left; padding:10px 14px; font-size:0.78rem; font-weight:700; color:var(--text-sub); text-transform:uppercase; letter-spacing:0.05em; border-bottom:2px solid var(--border); }
    .svc-list-table td { padding:12px 14px; border-bottom:1px solid var(--border); vertical-align:middle; }
    .svc-list-table tr:last-child td { border-bottom:none; }
    .svc-tags-row { display:flex; flex-wrap:wrap; gap:4px; }
    .svc-tag-sm { background:rgba(0,200,255,0.1); color:#7DD9F8; border:1px solid rgba(0,200,255,0.2); padding:2px 8px; border-radius:100px; font-size:0.72rem; font-weight:600; }

    /* Modal tabs */
    .modal-tabs { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:20px; }
    .modal-tab { padding:10px 20px; font-size:0.85rem; font-weight:600; color:var(--text-sub); cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all 0.2s; font-family:inherit; }
    .modal-tab.active { color:var(--navy); border-bottom-color:var(--navy); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* Dynamic list rows */
    .dyn-row { display:grid; gap:10px; align-items:center; background:rgba(0,0,0,0.15); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:8px; }
    .dyn-row-3 { grid-template-columns:60px 1fr 2fr 32px; }
    .dyn-row-2 { grid-template-columns:60px 1fr 32px; }
    .dyn-row-qa { grid-template-columns:1fr 32px; }
    .dyn-add-btn { background:rgba(0,200,255,0.08); border:1px dashed rgba(0,200,255,0.3); color:var(--navy); border-radius:8px; padding:8px; width:100%; font-size:0.85rem; cursor:pointer; font-family:inherit; transition:background 0.2s; }
    .dyn-add-btn:hover { background:rgba(0,200,255,0.15); }
    .dyn-del-btn { background:rgba(224,69,69,0.12); border:1px solid rgba(224,69,69,0.2); color:var(--red); border-radius:6px; padding:4px 8px; cursor:pointer; font-size:0.85rem; font-family:inherit; }
    .dyn-del-btn:hover { background:rgba(224,69,69,0.22); }

    .slug-row { display:flex; align-items:center; gap:8px; }
    .slug-preview { font-size:0.78rem; color:var(--text-sub); padding:6px 10px; background:rgba(0,0,0,0.2); border-radius:6px; flex:1; word-break:break-all; }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <img src="../IPCCLOGO-transparent.png" alt="IPCC" onerror="this.style.display='none'">
        <div class="sidebar-logo-text">
          <div class="co-name">IPCC 東州集團</div>
          <div class="co-sub">後台管理系統</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">📊 儀表板</a>
        <a href="home-manage.html" class="nav-item" data-perm="home">🏠 首頁管理</a>
        <a href="news-manage.html" class="nav-item" data-perm="news">📰 最新消息</a>
        <a href="about-manage.html" class="nav-item" data-perm="about">🏢 關於我們</a>
        <a href="services-manage.html" class="nav-item active" data-perm="services">🛠 專案服務</a>
        <a href="cases-manage.html" class="nav-item" data-perm="cases">🏆 成功案例</a>
        <a href="contacts-manage.html" class="nav-item" data-perm="contacts">📋 聯絡表單</a>
        <a href="contact-config.html" class="nav-item" data-perm="settings">📱 聯絡資訊設定</a>
        <a href="settings.html" class="nav-item" data-perm="settings">⚙️ 系統設定</a>
        <a href="users-manage.html" class="nav-item" data-perm="users">👥 帳號管理</a>
      </nav>
      <div class="sidebar-footer">
        <a href="../services.html" target="_blank" class="btn-view-site"><span>🔗</span>查看前台</a>
        <button onclick="logout()" class="btn-logout"><span>🚪</span>登出</button>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <main class="main-content">
      <header class="topbar">
        <button class="topbar-hamburger" onclick="toggleSidebar()">☰</button>
        <div class="topbar-title">專案服務管理</div>
        <div class="topbar-user">管理員</div>
      </header>
      <div class="page-content">
        <div class="page-header-row" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <div>
            <h1>專案服務管理</h1>
            <p style="color:var(--text-sub);font-size:0.9rem;">管理服務卡片與詳情頁內容，可拖曳調整順序</p>
          </div>
          <button class="btn-primary" onclick="openSvcModal()">+ 新增服務項目</button>
        </div>

        <div class="section-card">
          <div class="section-card-header">
            <h2 class="section-card-title">服務項目清單</h2>
            <span id="svcCount" style="font-size:0.82rem;color:var(--text-sub);"></span>
          </div>
          <div style="overflow-x:auto;">
            <table class="svc-list-table">
              <thead>
                <tr>
                  <th class="drag-handle-cell" title="拖曳排序">⇅</th>
                  <th>服務名稱</th>
                  <th>Slug（URL）</th>
                  <th>標籤</th>
                  <th>狀態</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="svcTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Service Modal -->
  <div class="modal-overlay" id="svcModal">
    <div class="modal modal-lg" style="max-width:780px;">
      <div class="modal-header">
        <h3 id="svcModalTitle">新增服務項目</h3>
        <button class="modal-close" onclick="closeSvcModal()">✕</button>
      </div>
      <div class="modal-body" style="max-height:72vh;overflow-y:auto;padding-right:4px;">
        <input type="hidden" id="svcId">

        <div class="modal-tabs">
          <button class="modal-tab active" onclick="switchTab('basic')">基本資訊</button>
          <button class="modal-tab" onclick="switchTab('detail')">詳情內容</button>
          <button class="modal-tab" onclick="switchTab('seo')">SEO 設定</button>
        </div>

        <!-- 基本資訊 -->
        <div class="tab-panel active" id="tab-basic">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
              <label class="form-label">服務編號標籤</label>
              <input type="text" class="form-control" id="svcNum" placeholder="如：Service 01">
            </div>
            <div style="display:grid;grid-template-columns:80px 1fr;gap:10px;align-items:end;">
              <div class="form-group">
                <label class="form-label">圖示</label>
                <input type="text" class="form-control" id="svcIcon" placeholder="🤖" style="text-align:center;font-size:1.4rem;">
              </div>
              <div class="form-group">
                <label class="form-label">服務名稱</label>
                <input type="text" class="form-control" id="svcTitle" placeholder="服務名稱" oninput="autoSlug()">
              </div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Slug（URL 識別碼）</label>
            <div class="slug-row">
              <input type="text" class="form-control" id="svcSlug" placeholder="如：smart-customer-service" style="flex:1;" oninput="updateSlugPreview()">
              <button type="button" class="btn-outline btn-sm" onclick="autoSlug(true)">自動產生</button>
            </div>
            <div style="margin-top:6px;" class="slug-preview" id="slugPreview">/services/（請輸入 slug）</div>
          </div>

          <div class="form-group">
            <label class="form-label">卡片簡介（顯示在服務列表頁）</label>
            <textarea class="form-control form-textarea" id="svcDesc" rows="3" placeholder="一段簡短的服務說明..."></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">標籤（用逗號分隔）</label>
            <input type="text" class="form-control" id="svcTags" placeholder="AI客服, 全天候服務, 品質管控">
          </div>

          <div class="form-group" style="display:flex;align-items:center;gap:10px;">
            <input type="checkbox" id="svcPublished" style="width:18px;height:18px;cursor:pointer;">
            <label for="svcPublished" class="form-label" style="margin:0;cursor:pointer;">發布（顯示在前台）</label>
          </div>
        </div>

        <!-- 詳情內容 -->
        <div class="tab-panel" id="tab-detail">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
              <label class="form-label">詳情頁主標題（Hero Title）</label>
              <input type="text" class="form-control" id="svcHeroTitle" placeholder="智能客服中心營運">
            </div>
            <div class="form-group">
              <label class="form-label">詳情頁副標題（Hero Subtitle）</label>
              <input type="text" class="form-control" id="svcHeroSub" placeholder="整合 AI 與人力，打造永不休息的客服體系">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">服務介紹（詳情頁正文）</label>
            <textarea class="form-control form-textarea" id="svcContent" rows="5" placeholder="詳細描述此服務的內容、價值與流程..."></textarea>
          </div>

          <div class="form-group">
            <label class="form-label" style="margin-bottom:10px;">服務特色（最多 6 項）</label>
            <div id="featuresList"></div>
            <button type="button" class="dyn-add-btn" onclick="addFeature()">+ 新增特色</button>
          </div>

          <div class="form-group">
            <label class="form-label" style="margin-bottom:10px;">適用產業</label>
            <div id="industriesList"></div>
            <button type="button" class="dyn-add-btn" onclick="addIndustry()">+ 新增產業</button>
          </div>

          <div class="form-group">
            <label class="form-label" style="margin-bottom:10px;">常見問題 FAQ</label>
            <div id="faqList"></div>
            <button type="button" class="dyn-add-btn" onclick="addFaq()">+ 新增 Q&amp;A</button>
          </div>
        </div>

        <!-- SEO -->
        <div class="tab-panel" id="tab-seo">
          <div class="form-group">
            <label class="form-label">SEO 標題（&lt;title&gt;）</label>
            <input type="text" class="form-control" id="svcSeoTitle" placeholder="智能客服中心營運 — IPCC 東州集團">
            <div style="font-size:0.78rem;color:var(--text-sub);margin-top:4px;">建議 30-60 字元</div>
          </div>
          <div class="form-group">
            <label class="form-label">SEO 描述（&lt;meta description&gt;）</label>
            <textarea class="form-control form-textarea" id="svcSeoDesc" rows="3" placeholder="IPCC 提供..."></textarea>
            <div style="font-size:0.78rem;color:var(--text-sub);margin-top:4px;">建議 80-160 字元</div>
          </div>
          <div class="form-group">
            <label class="form-label">封面圖片 URL（選填）</label>
            <input type="text" class="form-control" id="svcImage" placeholder="https://...">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-outline" onclick="closeSvcModal()">取消</button>
        <button class="btn-primary" onclick="saveSvc()">儲存</button>
      </div>
    </div>
  </div>

  <script src="users-config.js"></script>
  <script src="admin.js"></script>
  <script>
    requireLogin();
    initAdminUI();

    // ── Tab switching ────────────────────────────────────────────
    function switchTab(name) {
      document.querySelectorAll('.modal-tab').forEach(function(t, i) {
        var names = ['basic','detail','seo'];
        t.classList.toggle('active', names[i] === name);
      });
      document.querySelectorAll('.tab-panel').forEach(function(p) {
        p.classList.toggle('active', p.id === 'tab-' + name);
      });
    }

    // ── Render table ─────────────────────────────────────────────
    function renderTable() {
      var svcs = getServices().slice().sort(function(a,b){ return a.order - b.order; });
      document.getElementById('svcCount').textContent = svcs.length + ' 項服務';
      document.getElementById('svcTableBody').innerHTML = svcs.map(function(s) {
        var tags = (s.tags||[]).map(function(t){ return '<span class="svc-tag-sm">'+t+'</span>'; }).join('');
        var pub = s.published
          ? '<span style="font-size:0.75rem;padding:3px 10px;border-radius:100px;background:rgba(72,187,120,0.12);color:#68D391;">已發布</span>'
          : '<span style="font-size:0.75rem;padding:3px 10px;border-radius:100px;background:rgba(80,80,80,0.2);color:var(--text-sub);">草稿</span>';
        return '<tr data-id="'+s.id+'" draggable="true">'
          + '<td class="drag-handle-cell"><span class="drag-handle">⠿</span></td>'
          + '<td><span style="margin-right:8px;">'+(s.icon||'')+'</span><strong>'+(s.title||'')+'</strong><div style="font-size:0.75rem;color:var(--text-sub);margin-top:2px;">'+(s.num||'')+'</div></td>'
          + '<td style="font-size:0.82rem;color:var(--text-sub);font-family:monospace;">'+(s.slug ? '/services/'+s.slug : '—')+'</td>'
          + '<td><div class="svc-tags-row">'+tags+'</div></td>'
          + '<td>'+pub+'</td>'
          + '<td style="white-space:nowrap;">'
          + '<button class="btn-outline btn-sm" onclick="editSvc(\''+s.id+'\')">編輯</button>'
          + (s.slug ? ' <a href="../services/'+s.slug+'" target="_blank" class="btn-outline btn-sm" style="font-size:0.72rem;">預覽</a>' : '')
          + (!['svc-1','svc-2','svc-3','svc-4','svc-5'].includes(s.id) ? ' <button class="btn-red btn-sm" onclick="deleteSvc(\''+s.id+'\')">刪除</button>' : '')
          + '</td>'
          + '</tr>';
      }).join('');
      initTableDragSort('svcTableBody', getServices, saveServices, renderTable);
    }

    // ── Slug helpers ─────────────────────────────────────────────
    function titleToSlug(str) {
      return str.toLowerCase()
        .replace(/[一-鿿㐀-䶿]+/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '') || 'service-' + Date.now();
    }
    function autoSlug(force) {
      var slug = document.getElementById('svcSlug');
      if (force || !slug.value.trim()) {
        slug.value = titleToSlug(document.getElementById('svcTitle').value);
      }
      updateSlugPreview();
    }
    function updateSlugPreview() {
      var v = document.getElementById('svcSlug').value.trim();
      document.getElementById('slugPreview').textContent = v ? '/services/' + v : '/services/（請輸入 slug）';
    }

    // ── Dynamic list helpers ──────────────────────────────────────
    function addFeature(f) {
      f = f || {icon:'✦', title:'', desc:''};
      var id = 'feat-' + Date.now() + Math.random();
      var row = document.createElement('div');
      row.className = 'dyn-row dyn-row-3';
      row.dataset.fid = id;
      row.innerHTML = '<input type="text" value="'+escHtml(f.icon)+'" placeholder="圖示" style="text-align:center;font-size:1.3rem;" class="form-control" data-field="icon">'
        + '<input type="text" value="'+escHtml(f.title)+'" placeholder="特色標題" class="form-control" data-field="title">'
        + '<input type="text" value="'+escHtml(f.desc)+'" placeholder="特色說明" class="form-control" data-field="desc">'
        + '<button type="button" class="dyn-del-btn" onclick="this.closest(\'.dyn-row\').remove()">✕</button>';
      document.getElementById('featuresList').appendChild(row);
    }

    function addIndustry(ind) {
      ind = ind || {icon:'🏢', name:''};
      var row = document.createElement('div');
      row.className = 'dyn-row dyn-row-2';
      row.style.display = 'grid';
      row.innerHTML = '<input type="text" value="'+escHtml(ind.icon)+'" placeholder="圖示" style="text-align:center;font-size:1.3rem;" class="form-control" data-field="icon">'
        + '<input type="text" value="'+escHtml(ind.name)+'" placeholder="產業名稱" class="form-control" data-field="name">'
        + '<button type="button" class="dyn-del-btn" onclick="this.closest(\'.dyn-row\').remove()">✕</button>';
      document.getElementById('industriesList').appendChild(row);
    }

    function addFaq(f) {
      f = f || {q:'', a:''};
      var row = document.createElement('div');
      row.className = 'dyn-row';
      row.style.gridTemplateColumns = '1fr 32px';
      row.innerHTML = '<div>'
        + '<input type="text" value="'+escHtml(f.q)+'" placeholder="問題" class="form-control" data-field="q" style="margin-bottom:8px;">'
        + '<textarea placeholder="回答..." class="form-control form-textarea" data-field="a" rows="2" style="margin:0;">'+escHtml(f.a)+'</textarea>'
        + '</div>'
        + '<button type="button" class="dyn-del-btn" style="align-self:start;margin-top:4px;" onclick="this.closest(\'.dyn-row\').remove()">✕</button>';
      document.getElementById('faqList').appendChild(row);
    }

    function collectList(containerId, fields) {
      var rows = document.querySelectorAll('#' + containerId + ' .dyn-row');
      return Array.from(rows).map(function(row) {
        var obj = {};
        fields.forEach(function(f) {
          var el = row.querySelector('[data-field="'+f+'"]');
          obj[f] = el ? el.value.trim() : '';
        });
        return obj;
      }).filter(function(o) { return Object.values(o).some(function(v){ return v; }); });
    }

    function escHtml(s) {
      return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Modal open/close ──────────────────────────────────────────
    function openSvcModal(s) {
      switchTab('basic');
      document.getElementById('svcModalTitle').textContent = s ? '編輯服務項目' : '新增服務項目';
      document.getElementById('svcId').value       = s ? s.id : '';
      document.getElementById('svcNum').value      = s ? (s.num||'') : 'Service 0'+(getServices().length+1);
      document.getElementById('svcIcon').value     = s ? (s.icon||'📋') : '📋';
      document.getElementById('svcTitle').value    = s ? (s.title||'') : '';
      document.getElementById('svcSlug').value     = s ? (s.slug||'') : '';
      document.getElementById('svcDesc').value     = s ? (s.desc||'') : '';
      document.getElementById('svcTags').value     = s ? (s.tags||[]).join(', ') : '';
      document.getElementById('svcPublished').checked = s ? !!s.published : true;
      document.getElementById('svcHeroTitle').value = s ? (s.hero_title||'') : '';
      document.getElementById('svcHeroSub').value   = s ? (s.hero_subtitle||'') : '';
      document.getElementById('svcContent').value   = s ? (s.content||'') : '';
      document.getElementById('svcSeoTitle').value  = s ? (s.seo_title||'') : '';
      document.getElementById('svcSeoDesc').value   = s ? (s.seo_desc||'') : '';
      document.getElementById('svcImage').value     = s ? (s.image||'') : '';

      // Clear dynamic lists
      document.getElementById('featuresList').innerHTML = '';
      document.getElementById('industriesList').innerHTML = '';
      document.getElementById('faqList').innerHTML = '';

      if (s) {
        (s.features||[]).forEach(addFeature);
        (s.industries||[]).forEach(addIndustry);
        (s.faq||[]).forEach(addFaq);
      }

      updateSlugPreview();
      document.getElementById('svcModal').classList.add('open');
    }
    function closeSvcModal() { document.getElementById('svcModal').classList.remove('open'); }
    function editSvc(id) { var s = getServices().find(function(s){ return s.id===id; }); if(s) openSvcModal(s); }
    function deleteSvc(id) {
      if (!confirm('確定要刪除此服務項目？')) return;
      saveServices(getServices().filter(function(s){ return s.id!==id; }));
      renderTable();
    }

    function saveSvc() {
      var id = document.getElementById('svcId').value || genId();
      var svcs = getServices();
      var idx = svcs.findIndex(function(s){ return s.id===id; });
      var item = {
        id: id,
        num: document.getElementById('svcNum').value.trim(),
        icon: document.getElementById('svcIcon').value.trim() || '📋',
        title: document.getElementById('svcTitle').value.trim(),
        slug: document.getElementById('svcSlug').value.trim(),
        desc: document.getElementById('svcDesc').value.trim(),
        tags: document.getElementById('svcTags').value.split(',').map(function(t){ return t.trim(); }).filter(Boolean),
        published: document.getElementById('svcPublished').checked,
        hero_title: document.getElementById('svcHeroTitle').value.trim(),
        hero_subtitle: document.getElementById('svcHeroSub').value.trim(),
        content: document.getElementById('svcContent').value.trim(),
        features: collectList('featuresList', ['icon','title','desc']),
        industries: collectList('industriesList', ['icon','name']),
        faq: collectList('faqList', ['q','a']),
        seo_title: document.getElementById('svcSeoTitle').value.trim(),
        seo_desc: document.getElementById('svcSeoDesc').value.trim(),
        image: document.getElementById('svcImage').value.trim(),
        order: idx >= 0 ? svcs[idx].order : svcs.length
      };
      if (idx >= 0) svcs[idx] = item; else svcs.push(item);
      saveServices(svcs);
      closeSvcModal();
      renderTable();
    }

    renderTable();
  </script>
</body>
</html>
